<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>农资管家 · PC管理后台</title>
<style>
/* ── 变量 ── */
:root{
  --green:#1a5c2a;--green-mid:#2e7d32;--green-light:#e8f5e9;
  --amber:#f57c00;--amber-light:#fff3e0;
  --red:#c62828;--red-light:#ffebee;
  --blue:#1565c0;--blue-light:#e3f2fd;
  --bg:#f0f2f0;--white:#fff;
  --border:#e0e0e0;--text:#212121;--text2:#616161;--text3:#9e9e9e;
  --shadow:0 2px 12px rgba(0,0,0,.08);
  --radius:10px;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,'PingFang SC','Microsoft YaHei',sans-serif;background:var(--bg);color:var(--text);font-size:14px}

/* ── 布局 ── */
#app{display:flex;min-height:100vh}
.sidebar{width:220px;background:var(--green);display:flex;flex-direction:column;position:fixed;top:0;left:0;bottom:0;z-index:100;transition:transform .2s}
.sidebar-logo{padding:24px 20px 20px;border-bottom:1px solid rgba(255,255,255,.15)}
.logo-text{font-size:20px;font-weight:700;color:#fff;letter-spacing:1px}
.logo-sub{font-size:12px;color:rgba(255,255,255,.6);margin-top:4px}
.nav-section{padding:16px 16px 6px;font-size:11px;color:rgba(255,255,255,.45);letter-spacing:.5px;text-transform:uppercase}
.nav-item{display:flex;align-items:center;gap:10px;padding:11px 16px;cursor:pointer;color:rgba(255,255,255,.75);font-size:14px;border-radius:0;transition:background .12s}
.nav-item:hover{background:rgba(255,255,255,.12);color:#fff}
.nav-item.active{background:rgba(255,255,255,.18);color:#fff;font-weight:600;border-right:3px solid #fff}
.sidebar-bottom{margin-top:auto;padding:16px}
.logout-btn{width:100%;padding:10px;background:rgba(255,255,255,.12);color:#fff;border:none;border-radius:8px;cursor:pointer;font-size:13px}
.logout-btn:hover{background:rgba(255,255,255,.2)}

.main{margin-left:220px;flex:1;display:flex;flex-direction:column;min-height:100vh}
.topbar{background:#fff;border-bottom:1px solid var(--border);padding:0 24px;height:56px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:50;box-shadow:0 1px 4px rgba(0,0,0,.06)}
.topbar-title{font-size:16px;font-weight:600;color:var(--text)}
.topbar-right{display:flex;align-items:center;gap:12px;font-size:13px;color:var(--text2)}
.user-tag{background:var(--green-light);color:var(--green-mid);padding:4px 12px;border-radius:20px;font-weight:500}
.content{flex:1;padding:24px;overflow-y:auto}

/* ── 卡片 ── */
.card{background:#fff;border-radius:var(--radius);box-shadow:var(--shadow);padding:20px;margin-bottom:16px}
.card-title{font-size:15px;font-weight:600;margin-bottom:16px;display:flex;align-items:center;justify-content:space-between}
.stat-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:16px}
.stat-card{background:#fff;border-radius:var(--radius);box-shadow:var(--shadow);padding:16px;border-left:4px solid var(--border)}
.stat-card.g{border-color:var(--green)}.stat-card.a{border-color:var(--amber)}
.stat-card.r{border-color:var(--red)}.stat-card.b{border-color:var(--blue)}
.stat-num{font-size:30px;font-weight:700;line-height:1}
.stat-card.g .stat-num{color:var(--green)}.stat-card.a .stat-num{color:var(--amber)}
.stat-card.r .stat-num{color:var(--red)}.stat-card.b .stat-num{color:var(--blue)}
.stat-lab{font-size:12px;color:var(--text3);margin-top:4px}

/* ── 表格 ── */
.tbl-wrap{overflow-x:auto}
.tbl{width:100%;border-collapse:collapse;font-size:13px}
.tbl th{padding:10px 12px;text-align:left;background:#f5f5f5;color:var(--text2);font-weight:600;border-bottom:1px solid var(--border);white-space:nowrap}
.tbl td{padding:10px 12px;border-bottom:1px solid #f0f0f0;vertical-align:middle}
.tbl tr:hover td{background:#fafafa}
.tbl tr:last-child td{border-bottom:none}

/* ── 工具栏 ── */
.toolbar{display:flex;gap:10px;align-items:center;margin-bottom:14px;flex-wrap:wrap}
.search-input{padding:8px 14px;border:1px solid var(--border);border-radius:8px;font-size:13px;outline:none;min-width:200px}
.search-input:focus{border-color:var(--green)}
.select-input{padding:8px 12px;border:1px solid var(--border);border-radius:8px;font-size:13px;outline:none;background:#fff}
.select-input:focus{border-color:var(--green)}

/* ── 按钮 ── */
.btn{padding:8px 16px;border-radius:8px;border:none;cursor:pointer;font-size:13px;font-weight:600;display:inline-flex;align-items:center;gap:6px;transition:opacity .12s}
.btn:hover{opacity:.85}
.btn-green{background:var(--green);color:#fff}
.btn-amber{background:var(--amber);color:#fff}
.btn-red{background:var(--red);color:#fff}
.btn-blue{background:var(--blue);color:#fff}
.btn-ghost{background:#f0f0f0;color:var(--text2)}
.btn-sm{padding:5px 12px;font-size:12px}
.btn-icon{padding:5px 8px;font-size:14px}

/* ── 徽标 ── */
.badge{display:inline-block;padding:2px 8px;border-radius:20px;font-size:11px;font-weight:600}
.badge-in{background:var(--green-light);color:var(--green-mid)}
.badge-out{background:var(--amber-light);color:var(--amber)}
.badge-warn{background:var(--red-light);color:var(--red)}
.badge-ok{background:var(--green-light);color:var(--green-mid)}
.badge-gray{background:#f0f0f0;color:var(--text2)}

/* ── 进度条 ── */
.stock-bar{height:6px;background:#eee;border-radius:3px;overflow:hidden;min-width:60px}
.stock-bar-fill{height:100%;border-radius:3px}

/* ── 分页 ── */
.pagination{display:flex;justify-content:flex-end;align-items:center;gap:8px;margin-top:14px;font-size:13px;color:var(--text2)}
.page-btn{padding:5px 12px;border:1px solid var(--border);border-radius:6px;cursor:pointer;background:#fff}
.page-btn:hover{background:var(--green-light);border-color:var(--green)}
.page-btn.active{background:var(--green);color:#fff;border-color:var(--green)}

/* ── 弹窗 ── */
.modal-mask{display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:200;align-items:center;justify-content:center;padding:16px}
.modal-mask.open{display:flex}
.modal{background:#fff;border-radius:14px;width:100%;max-width:520px;max-height:90vh;overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,.2)}
.modal-head{padding:20px 20px 0;display:flex;justify-content:space-between;align-items:center}
.modal-head h3{font-size:16px;font-weight:700}
.modal-body{padding:16px 20px 20px}
.form-row{margin-bottom:14px}
.form-label{font-size:12px;color:var(--text2);margin-bottom:5px;font-weight:500;display:block}
.form-required::before{content:'* ';color:var(--red)}
.form-input{width:100%;padding:9px 12px;border:1px solid var(--border);border-radius:8px;font-size:13px;outline:none}
.form-input:focus{border-color:var(--green)}
.form-grid-2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.modal-footer{display:flex;gap:10px;margin-top:4px}
.modal-footer .btn{flex:1;justify-content:center;padding:10px}

/* ── 扫码区 ── */
.scan-section{background:#f8fdf8;border:2px dashed var(--green);border-radius:10px;padding:16px;margin-bottom:14px}
.scan-row{display:flex;gap:8px}
.scan-row input{flex:1}

/* ── 图表占位 ── */
.chart-placeholder{height:200px;background:linear-gradient(135deg,var(--green-light),var(--blue-light));border-radius:8px;display:flex;align-items:center;justify-content:center;color:var(--green-mid);font-size:13px;gap:8px}

/* ── 预警栏 ── */
.warn-bar{display:flex;align-items:center;gap:10px;padding:10px 14px;background:var(--red-light);border:1px solid #ef9a9a;border-radius:8px;margin-bottom:14px;font-size:13px;color:var(--red);cursor:pointer}

/* ── 登录页 ── */
.login-page{min-height:100vh;background:linear-gradient(135deg,var(--green) 0%,#2e7d32 50%,var(--bg) 50%);display:flex;align-items:center;justify-content:center}
.login-box{background:#fff;border-radius:20px;padding:40px;width:360px;box-shadow:0 20px 60px rgba(0,0,0,.15)}
.login-logo{text-align:center;margin-bottom:32px}
.login-logo .icon{font-size:48px}
.login-logo .title{font-size:24px;font-weight:700;margin-top:8px;color:var(--text)}
.login-logo .sub{font-size:13px;color:var(--text3);margin-top:4px}

/* ── 空态 ── */
.empty{text-align:center;padding:40px;color:var(--text3);font-size:13px}

/* ── toast ── */
.toast{position:fixed;top:70px;left:50%;transform:translateX(-50%) translateY(-10px);background:#323232;color:#fff;padding:10px 20px;border-radius:20px;font-size:13px;z-index:1000;opacity:0;transition:opacity .2s,transform .2s;pointer-events:none;white-space:nowrap}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
.toast.ok{background:var(--green-mid)}.toast.err{background:var(--red)}.toast.warn{background:var(--amber)}

@media(max-width:900px){.stat-grid{grid-template-columns:repeat(2,1fr)}}
</style>
</head>
<body>

<!-- 登录页 -->
<div id="login-page" class="login-page">
  <div class="login-box">
    <div class="login-logo">
      <div class="icon">🌱</div>
      <div class="title">农资管家</div>
      <div class="sub">PC 管理后台</div>

  </div>
</div>

<!-- 主应用（登录后显示） -->
<div id="app" style="display:none">
  <aside class="sidebar">
    <div class="sidebar-logo">
      <div class="logo-text">🌱 农资管家</div>
      <div class="logo-sub">PC 管理后台</div>
    </div>
    <div class="nav-section">主功能</div>

        <span class="user-tag" id="user-tag">管理员</span>

    <div class="content" id="content"></div>
  </div>
</div>

<div class="toast" id="toast"></div>

<!-- ════════════════════ MODAL ════════════════════ -->
<!-- 商品弹窗 -->
<div class="modal-mask" id="modal-product">
  <div class="modal">
    <div class="modal-head">
      <h3 id="m-product-title">新增商品</h3>
      <button class="btn btn-ghost btn-icon" onclick="closeModal('product')">✕</button>
    </div>
    <div class="modal-body">

<!-- 入/出库弹窗 -->

          <input class="form-input" id="m-sup-phone" placeholder="可选">

        <input class="form-input" id="m-sup-addr" placeholder="可选">
      </div>

        <button class="btn btn-ghost" onclick="closeModal('supplier')">取消</button>

<script>
// ══════════════════════════════════════════════
// 配置
// ══════════════════════════════════════════════
const API = 'https://你的域名/api'   // ← 改为实际地址

// ══════════════════════════════════════════════
// HTTP 工具
// ══════════════════════════════════════════════
async function api(method, url, data) {
  const token = localStorage.getItem('token')
  const opts = {
    method,
    headers: { 'Content-Type': 'application/json', ...(token ? { Authorization: 'Bearer ' + token } : {}) }
  }
  if (data && method !== 'GET') opts.body = JSON.stringify(data)
  let fullUrl = API + url
  if (data && method === 'GET') {
    const q = Object.entries(data).filter(([,v]) => v !== undefined && v !== '').map(([k,v]) => k+'='+encodeURIComponent(v)).join('&')
    if (q) fullUrl += '?' + q
  }
  const res  = await fetch(fullUrl, opts)
  const json = await res.json()
  if (json.code === 401) { logout(); return null }
  if (json.code !== 200) { toast(json.message || '操作失败', 'err'); throw new Error(json.message) }
  return json
}

// ══════════════════════════════════════════════
// Toast
// ══════════════════════════════════════════════
let toastTimer
function toast(msg, type = 'ok', ms = 2200) {
  const t = document.getElementById('toast')
  t.textContent = msg; t.className = 'toast ' + type + ' show'
  clearTimeout(toastTimer); toastTimer = setTimeout(() => t.className = 'toast', ms)
}

// ══════════════════════════════════════════════
// 登录 / 登出
// ══════════════════════════════════════════════
document.getElementById('login-btn').onclick = async () => {
  const u = document.getElementById('login-user').value.trim()
  const p = document.getElementById('login-pwd').value
  if (!u || !p) return toast('请填写账号密码', 'err')
  try {
    const r = await api('POST', '/auth/login', { username: u, password: p })
    if (!r) return
    localStorage.setItem('token',    r.data.token)
    localStorage.setItem('userInfo', JSON.stringify(r.data.user))
    document.getElementById('login-page').style.display = 'none'
    document.getElementById('app').style.display = 'flex'
    document.getElementById('user-tag').textContent = r.data.user.real_name + ' · ' + (r.data.user.role === 'admin' ? '管理员' : '员工')
    initApp()
  } catch {}
}

document.getElementById('login-pwd').onkeydown = e => { if (e.key === 'Enter') document.getElementById('login-btn').click() }
document.getElementById('logout-btn').onclick = logout

function logout() {
  localStorage.removeItem('token'); localStorage.removeItem('userInfo')
  document.getElementById('app').style.display = 'none'
  document.getElementById('login-page').style.display = 'flex'
}

// 刷新时检查登录状态
if (localStorage.getItem('token')) {
  document.getElementById('login-page').style.display = 'none'
  document.getElementById('app').style.display = 'flex'
  const u = JSON.parse(localStorage.getItem('userInfo') || '{}')
  document.getElementById('user-tag').textContent = (u.real_name || '') + ' · ' + (u.role === 'admin' ? '管理员' : '员工')
  window.addEventListener('load', initApp)
}

// ══════════════════════════════════════════════
// 导航
// ══════════════════════════════════════════════
const PAGE_TITLES = {
  dashboard:'总览看板', scan:'扫码入/出库', inventory:'库存管理',
  records:'出入库记录', supplier:'供应商管理', category:'商品分类', users:'员工账号'
}

document.querySelectorAll('.nav-item[data-page]').forEach(el => {
  el.onclick = () => switchPage(el.dataset.page)
})

function switchPage(name) {
  document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'))
  document.querySelector(`.nav-item[data-page="${name}"]`)?.classList.add('active')
  document.getElementById('page-title').textContent = PAGE_TITLES[name] || name
  const fn = { dashboard, scan, inventory, records, supplier, category, users }
  fn[name]?.()
}

// 时钟
// ══════════════════════════════════════════════
function initApp() {
  setInterval(() => {
    document.getElementById('clock-bar').textContent = new Date().toLocaleString('zh-CN', { hour:'2-digit', minute:'2-digit', second:'2-digit' })
  }, 1000)
  switchPage('dashboard')
  prefetchMeta()
}

// 预加载分类/供应商（弹窗用）

let _categories = [], _suppliers = []
async function prefetchMeta() {
  const [cats, sups] = await Promise.all([api('GET', '/categories'), api('GET', '/suppliers')])

  _suppliers  = sups?.data || []
}

// 1. 总览看板

async function dashboard() {

  c.innerHTML = `<div id="warn-bar-wrap"></div>

      <div class="stat-card a"><div class="stat-num">--</div><div class="stat-lab">今日出库（件）</div></div>
    </div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px">
      <div class="card">
        <div class="card-title">本月统计</div>
        <div id="month-stats" style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px;text-align:center"></div>
      </div>
      <div class="card">
        <div class="card-title">库存预警</div>
        <div id="warn-list"></div>
      </div>
    </div>
    <div class="card" style="margin-top:16px">

        <th>时间</th><th>类型</th><th>商品</th><th>数量</th><th>操作人</th><th>备注</th>
      </tr></thead><tbody id="today-tbody"></tbody></table></div>

  const [stats, warnList, todayRec] = await Promise.all([
    api('GET', '/stock/stats'),
    api('GET', '/products/warn/list'),
    api('GET', '/stock/records', { start_date: new Date().toISOString().slice(0,10), pageSize: 20 })
  ])

  const s = stats?.data
  if (s) {
    const nums = document.querySelectorAll('.stat-num')
    nums[0].textContent = s.total_products ?? '--'
    nums[1].textContent = s.warn_count ?? '--'
    nums[2].textContent = s.today?.today_in_qty ?? 0
    nums[3].textContent = s.today?.today_out_qty ?? 0
    document.getElementById('month-stats').innerHTML = `
      <div><div style="font-size:28px;font-weight:700;color:var(--green)">${s.month?.month_in_qty||0}</div><div style="font-size:12px;color:var(--text3)">入库件数</div></div>

    wb.innerHTML = `<div class="warn-bar" onclick="switchPage('inventory')">⚠️ <span>${s.warn_count} 种商品库存不足，点击查看</span><span style="margin-left:auto">›</span></div>`
  }

  const wl = document.getElementById('warn-list')
  const warns = warnList?.data || []
  wl.innerHTML = warns.slice(0,5).map(p => `
    <div style="padding:8px 0;border-bottom:1px solid #f0f0f0;display:flex;align-items:center;gap:10px">
      <span style="flex:1;font-size:13px">${p.name}</span>
      <div class="stock-bar" style="width:80px"><div class="stock-bar-fill" style="width:${Math.min(100,Math.round(p.stock/(p.warn_stock*2||1)*100))}%;background:var(--red)"></div></div>

    </div>`).join('') || '<div class="empty">✅ 所有库存充足</div>'

  const tb = document.getElementById('today-tbody')
  tb.innerHTML = (todayRec?.data || []).map(r => `<tr>
    <td>${r.created_at?.slice(11,16)}</td>
    <td><span class="badge badge-${r.type}">${r.type==='in'?'入库':'出库'}</span></td>

    <div class="card">
      <div class="card-title">
        <span>扫码操作</span>
        <div style="display:flex;gap:8px">
          <button class="btn btn-green btn-sm" onclick="openStockModal('in')">📦 入库</button>
          <button class="btn btn-amber btn-sm" onclick="openStockModal('out')">🚚 出库</button>
        </div>
      </div>
      <div class="scan-section">
        <div style="font-size:12px;color:var(--green-mid);font-weight:600;margin-bottom:8px">📷 快速扫码查询</div>
        <div class="scan-row">
          <input class="form-input" id="quick-scan" placeholder="扫码枪扫描 或 输入条码" autofocus>
          <button class="btn btn-green" onclick="quickLookup()">查询</button>
        </div>
      </div>
      <div id="quick-result"></div>
      <div style="margin-top:16px;padding:12px;background:#f5f5f5;border-radius:8px;font-size:12px;color:var(--text3);line-height:1.8">

        出库：销售/领用时扫描出库
      </div>
    </div>
    <div class="card">
      <div class="card-title">今日出入库</div>
      <div id="scan-today-list" style="max-height:500px;overflow-y:auto"></div>
    </div>
  </div>`

  document.getElementById('quick-scan').onkeydown = e => { if (e.key === 'Enter') quickLookup() }

async function quickLookup() {
  const code = document.getElementById('quick-scan').value.trim()
  if (!code) return
  try {
    const { data: p } = await api('GET', `/products/barcode/${code}`)
    const isWarn = p.stock <= p.warn_stock
    document.getElementById('quick-result').innerHTML = `
      <div style="background:var(--green-light);border:1px solid #a5d6a7;border-radius:8px;padding:14px;margin-top:12px">
        <div style="font-size:15px;font-weight:700">${p.name}</div>
        <div style="font-size:12px;color:var(--text2);margin-top:4px">${p.spec||'—'} · ${p.category_name||'—'} · ¥${p.sale_price}</div>
        <div style="margin-top:10px;display:flex;gap:8px">
          <span style="font-size:13px;color:${isWarn?'var(--red)':'var(--green)'};font-weight:600">库存：${p.stock} ${p.unit}</span>
          <button class="btn btn-green btn-sm" onclick="openStockModal('in','${p.barcode}')">入库</button>
          <button class="btn btn-amber btn-sm" onclick="openStockModal('out','${p.barcode}')">出库</button>
        </div>
      </div>`
  } catch {
    document.getElementById('quick-result').innerHTML = `
      <div style="background:var(--amber-light);border:1px solid #ffcc80;border-radius:8px;padding:14px;margin-top:12px">
        <div style="font-weight:600;color:var(--amber)">条码未录入：${code}</div>
        <button class="btn btn-green btn-sm" style="margin-top:10px" onclick="openProductModal(null,'${code}')">立即录入商品</button>
      </div>`
  }
}

async function loadScanToday() {
  const el = document.getElementById('scan-today-list')
  if (!el) return
  const { data: rows } = await api('GET', '/stock/records', { start_date: new Date().toISOString().slice(0,10), pageSize: 50 })
  el.innerHTML = (rows||[]).map(r => `
    <div style="display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid #f0f0f0">
      <span class="badge badge-${r.type}">${r.type==='in'?'入库':'出库'}</span>
      <span style="flex:1;font-size:13px"><b>${r.product_name}</b></span>
      <span style="font-size:13px;font-weight:700;color:${r.type==='in'?'var(--green)':'var(--amber)'}">${r.type==='in'?'+':'-'}${r.qty}</span>
      <span style="font-size:12px;color:var(--text3)">${r.created_at?.slice(11,16)}</span>
    </div>`).join('') || '<div class="empty">今日暂无记录</div>'
}

let invPage = 1, invKw = '', invFilter = 'all', invTotal = 0

async function inventory() {
  const c = document.getElementById('content')
  c.innerHTML = `
  <div class="card">
    <div class="toolbar">
      <input class="search-input" id="inv-kw" placeholder="搜索商品名、条码…" oninput="invSearch()">
      <select class="select-input" id="inv-filter" onchange="invPage=1;loadInventory()">
        <option value="all">全部</option>
        <option value="warn">仅预警</option>
      </select>
      <button class="btn btn-green" onclick="openProductModal()">+ 新增商品</button>
      <button class="btn btn-ghost" onclick="exportInv()">⬇ 导出CSV</button>
      <span id="inv-total" style="margin-left:auto;font-size:13px;color:var(--text3)"></span>
    </div>
    <div class="tbl-wrap">
      <table class="tbl">
        <thead><tr><th>条码</th><th>商品名称</th><th>分类</th><th>规格</th><th>库存</th><th>预警</th><th>进价</th><th>售价</th><th>供应商</th><th>操作</th></tr></thead>
        <tbody id="inv-tbody"></tbody>
      </table>
    </div>
    <div class="pagination" id="inv-pager"></div>
  </div>`
  loadInventory()
}

let invTimer
function invSearch() { clearTimeout(invTimer); invTimer = setTimeout(() => { invPage = 1; loadInventory() }, 350) }

async function loadInventory() {
  invKw     = document.getElementById('inv-kw')?.value || ''
  invFilter = document.getElementById('inv-filter')?.value || 'all'
  const r   = await api('GET', '/products', { page: invPage, pageSize: 20, keyword: invKw || undefined, warn_only: invFilter === 'warn' ? 1 : undefined })
  invTotal  = r?.total || 0
  document.getElementById('inv-total').textContent = `共 ${invTotal} 种`
  const rows = r?.data || []
  document.getElementById('inv-tbody').innerHTML = rows.map(p => {
    const warn = p.stock <= p.warn_stock
    const pct  = p.warn_stock > 0 ? Math.min(100, Math.round(p.stock / (p.warn_stock * 2) * 100)) : 100
    const col  = pct < 30 ? 'var(--red)' : pct < 60 ? 'var(--amber)' : 'var(--green)'
    return `<tr>
      <td style="font-family:monospace;font-size:12px;color:var(--text3)">${p.barcode}</td>
      <td><b>${p.name}</b>${p.remark?`<div style="font-size:11px;color:var(--text3)">${p.remark}</div>`:''}</td>
      <td><span class="badge badge-gray">${p.category_name||'—'}</span></td>
      <td>${p.spec||'—'}</td>
      <td>
        <div style="display:flex;align-items:center;gap:6px">
          <div class="stock-bar"><div class="stock-bar-fill" style="width:${pct}%;background:${col}"></div></div>
          <span style="font-weight:700;color:${warn?'var(--red)':'var(--green)'}">${p.stock}</span>
        </div>
      </td>
      <td style="color:var(--text3)">${p.warn_stock}</td>
      <td>¥${p.cost_price}</td>
      <td style="color:var(--green-mid);font-weight:600">¥${p.sale_price}</td>
      <td style="font-size:12px">${p.supplier_name||'—'}</td>
      <td>
        <button class="btn btn-ghost btn-sm" onclick="openProductModal(${p.id})">编辑</button>
        <button class="btn btn-green btn-sm" style="margin-left:4px" onclick="openStockModal('in','${p.barcode}')">入库</button>
        <button class="btn btn-amber btn-sm" style="margin-left:4px" onclick="openStockModal('out','${p.barcode}')">出库</button>
        <button class="btn btn-sm" style="margin-left:4px;background:var(--red-light);color:var(--red)" onclick="delProduct(${p.id},'${p.name}')">删</button>
      </td>
    </tr>`
  }).join('') || `<tr><td colspan="10" class="empty">暂无商品</td></tr>`

  renderPager('inv-pager', invPage, Math.ceil(invTotal / 20), p => { invPage = p; loadInventory() })
}

async function delProduct(id, name) {
  if (!confirm(`确认删除「${name}」？此操作不可恢复。`)) return
  await api('DELETE', `/products/${id}`)
  toast('已删除'); loadInventory()
}

async function exportInv() {
  const r = await api('GET', '/products', { pageSize: 1000 })
  const rows = [['条码','商品名称','分类','规格','单位','库存','预警值','进价','售价','供应商']]
  ;(r?.data || []).forEach(p => rows.push([p.barcode,p.name,p.category_name||'',p.spec||'',p.unit,p.stock,p.warn_stock,p.cost_price,p.sale_price,p.supplier_name||'']))
  downloadCSV(rows, '库存列表_' + new Date().toISOString().slice(0,10))
  toast('导出成功')
}

// ══════════════════════════════════════════════
// 4. 出入库记录
// ══════════════════════════════════════════════
let recPage = 1, recType = 'all', recKw = '', recStart = '', recEnd = ''

async function records() {
  const c = document.getElementById('content')
  const today = new Date().toISOString().slice(0,10)
  const mon   = new Date().toISOString().slice(0,7) + '-01'
  c.innerHTML = `
  <div class="card">
    <div class="toolbar">
      <input class="search-input" id="rec-kw" placeholder="搜索商品名…" oninput="recSearch()">
      <select class="select-input" id="rec-type" onchange="recPage=1;loadRecords()">
        <option value="all">全部</option><option value="in">入库</option><option value="out">出库</option>
      </select>
      <input type="date" class="select-input" id="rec-start" value="${mon}" onchange="recPage=1;loadRecords()">
      <span style="color:var(--text3)">—</span>
      <input type="date" class="select-input" id="rec-end" value="${today}" onchange="recPage=1;loadRecords()">
      <button class="btn btn-ghost" onclick="exportRec()">⬇ 导出CSV</button>
      <span id="rec-total" style="margin-left:auto;font-size:13px;color:var(--text3)"></span>
    </div>
    <div id="rec-summary" style="display:flex;gap:20px;margin-bottom:12px;font-size:13px"></div>
    <div class="tbl-wrap">
      <table class="tbl">
        <thead><tr><th>时间</th><th>类型</th><th>条码</th><th>商品名称</th><th>数量</th><th>单价</th><th>金额</th><th>操作前</th><th>操作后</th><th>客户/供应商</th><th>操作人</th><th>备注</th></tr></thead>
        <tbody id="rec-tbody"></tbody>
      </table>
    </div>
    <div class="pagination" id="rec-pager"></div>
  </div>`
  loadRecords()
}

let recTimer
function recSearch() { clearTimeout(recTimer); recTimer = setTimeout(() => { recPage = 1; loadRecords() }, 350) }

async function loadRecords() {
  recType  = document.getElementById('rec-type')?.value || 'all'
  recKw    = document.getElementById('rec-kw')?.value || ''
  recStart = document.getElementById('rec-start')?.value || ''
  recEnd   = document.getElementById('rec-end')?.value || ''
  const r  = await api('GET', '/stock/records', {
    page: recPage, pageSize: 20,
    type:       recType !== 'all' ? recType : undefined,
    keyword:    recKw || undefined,
    start_date: recStart || undefined,
    end_date:   recEnd   || undefined,
  })
  const rows = r?.data || []
  document.getElementById('rec-total').textContent = `共 ${r?.total || 0} 条`

  const inQty  = rows.filter(r=>r.type==='in').reduce((a,b)=>a+b.qty,0)
  const outQty = rows.filter(r=>r.type==='out').reduce((a,b)=>a+b.qty,0)
  const outAmt = rows.filter(r=>r.type==='out').reduce((a,b)=>a+(b.total_amount||0),0)
  document.getElementById('rec-summary').innerHTML = `
    <span style="color:var(--green)">入库 <b>+${inQty}</b> 件</span>
    <span style="color:var(--amber)">出库 <b>-${outQty}</b> 件</span>
    <span style="color:var(--blue)">销售金额 <b>¥${outAmt.toFixed(0)}</b></span>`

  document.getElementById('rec-tbody').innerHTML = rows.map(r => `<tr>
    <td style="white-space:nowrap;font-size:12px">${r.created_at?.slice(0,16)}</td>
    <td><span class="badge badge-${r.type}">${r.type==='in'?'入库':'出库'}</span></td>
    <td style="font-family:monospace;font-size:12px;color:var(--text3)">${r.barcode}</td>
    <td><b>${r.product_name}</b></td>
    <td style="font-weight:700;color:${r.type==='in'?'var(--green)':'var(--amber)'}">${r.type==='in'?'+':'-'}${r.qty}</td>
    <td>${r.unit_price ? '¥'+r.unit_price : '—'}</td>
    <td>${r.total_amount ? '¥'+Number(r.total_amount).toFixed(2) : '—'}</td>
    <td style="color:var(--text3)">${r.before_stock}</td>
    <td style="color:var(--text3)">${r.after_stock}</td>
    <td style="font-size:12px">${r.type==='in'?(r.supplier||'—'):(r.customer||'—')}</td>
    <td style="font-size:12px">${r.operator_name}</td>
    <td style="font-size:12px;color:var(--text3)">${r.remark||'—'}</td>
  </tr>`).join('') || `<tr><td colspan="12" class="empty">暂无记录</td></tr>`

  renderPager('rec-pager', recPage, Math.ceil((r?.total||0)/20), p => { recPage = p; loadRecords() })
}

async function exportRec() {
  const r = await api('GET', '/stock/records', { type: recType !== 'all' ? recType : undefined, keyword: recKw||undefined, start_date: recStart||undefined, end_date: recEnd||undefined, pageSize: 5000 })
  const rows = [['时间','类型','条码','商品名称','数量','单价','金额','操作前库存','操作后库存','客户/供应商','操作人','备注']]
  ;(r?.data||[]).forEach(row => rows.push([row.created_at,row.type==='in'?'入库':'出库',row.barcode,row.product_name,row.qty,row.unit_price||'',row.total_amount||'',row.before_stock,row.after_stock,row.type==='in'?(row.supplier||''):(row.customer||''),row.operator_name,row.remark||'']))
  downloadCSV(rows, '出入库记录_' + new Date().toISOString().slice(0,10))
  toast('导出成功')
}

async function supplier() {
  const c = document.getElementById('content')
  c.innerHTML = `<div class="card">
    <div class="toolbar"><button class="btn btn-green" onclick="openModal('supplier');document.getElementById('m-sup-title').textContent='新增供应商';['m-sup-id','m-sup-name','m-sup-contact','m-sup-phone','m-sup-addr'].forEach(id=>document.getElementById(id).value='')">+ 新增供应商</button></div>
    <div class="tbl-wrap"><table class="tbl"><thead><tr><th>名称</th><th>联系人</th><th>电话</th><th>地址</th><th>操作</th></tr></thead><tbody id="sup-tbody"></tbody></table></div>
  </div>`
  const { data: rows } = await api('GET', '/suppliers')
  document.getElementById('sup-tbody').innerHTML = (rows||[]).map(s => `<tr>
    <td><b>${s.name}</b></td><td>${s.contact||'—'}</td><td>${s.phone||'—'}</td><td style="font-size:12px">${s.address||'—'}</td>
    <td>
      <button class="btn btn-ghost btn-sm" onclick='editSupplier(${JSON.stringify(s)})'>编辑</button>
      <button class="btn btn-sm" style="background:var(--red-light);color:var(--red);margin-left:4px" onclick="delSupplier(${s.id},'${s.name}')">删除</button>
    </td>
  </tr>`).join('') || `<tr><td colspan="5" class="empty">暂无供应商</td></tr>`
}

function editSupplier(s) {
  document.getElementById('m-sup-title').textContent = '编辑供应商'
  document.getElementById('m-sup-id').value      = s.id
  document.getElementById('m-sup-name').value    = s.name
  document.getElementById('m-sup-contact').value = s.contact||''
  document.getElementById('m-sup-phone').value   = s.phone||''
  document.getElementById('m-sup-addr').value    = s.address||''
  openModal('supplier')
}

async function saveSupplier() {
  const id   = document.getElementById('m-sup-id').value
  const body = { name: document.getElementById('m-sup-name').value.trim(), contact: document.getElementById('m-sup-contact').value, phone: document.getElementById('m-sup-phone').value, address: document.getElementById('m-sup-addr').value }

}

async function loadCategories() {

  document.getElementById('cat-list').innerHTML = (rows||[]).map(c => `
    <div style="display:flex;align-items:center;padding:10px 0;border-bottom:1px solid #f0f0f0">
      <span style="flex:1;font-size:14px">${c.name}</span>
      <button class="btn btn-sm" style="background:var(--red-light);color:var(--red)" onclick="delCategory(${c.id},'${c.name}')">删除</button>
    </div>`).join('')
}

async function addCategory() {
  const name = document.getElementById('new-cat-name').value.trim()
  if (!name) return toast('请输入分类名称', 'err')
  await api('POST', '/categories', { name })
  document.getElementById('new-cat-name').value = ''
  toast('已添加'); loadCategories(); prefetchMeta()
}

async function delCategory(id, name) {
  if (!confirm(`确认删除分类「${name}」？`)) return
  await api('DELETE', `/categories/${id}`); toast('已删除'); loadCategories(); prefetchMeta()
}

async function openProductModal(id, barcode) {
  // 填充分类、供应商
  document.getElementById('m-p-cat').innerHTML = '<option value="">请选择</option>' + _categories.map(c => `<option value="${c.id}">${c.name}</option>`).join('')
  document.getElementById('m-p-sup').innerHTML = '<option value="">请选择</option>' + _suppliers.map(s => `<option value="${s.id}">${s.name}</option>`).join('')

  if (id) {
    document.getElementById('m-product-title').textContent = '编辑商品'
    const { data: p } = await api('GET', `/products/${id}`)
    document.getElementById('m-p-edit-id').value   = p.id
    document.getElementById('m-p-barcode').value   = p.barcode
    document.getElementById('m-p-barcode').disabled= true
    document.getElementById('m-p-name').value      = p.name
    document.getElementById('m-p-spec').value      = p.spec||''
    document.getElementById('m-p-unit').value      = p.unit||'件'
    document.getElementById('m-p-cost').value      = p.cost_price||0
    document.getElementById('m-p-price').value     = p.sale_price||0
    document.getElementById('m-p-stock').value     = p.stock||0
    document.getElementById('m-p-warn').value      = p.warn_stock||10
    document.getElementById('m-p-cat').value       = p.category_id||''
    document.getElementById('m-p-sup').value       = p.supplier_id||''
  } else {
    document.getElementById('m-product-title').textContent = '新增商品'
    document.getElementById('m-p-edit-id').value   = ''
    document.getElementById('m-p-barcode').disabled= false
    ;['m-p-barcode','m-p-name','m-p-spec'].forEach(id => document.getElementById(id).value = '')
    document.getElementById('m-p-barcode').value   = barcode || ''
    document.getElementById('m-p-unit').value      = '件'
    document.getElementById('m-p-cost').value      = ''
    document.getElementById('m-p-price').value     = ''
    document.getElementById('m-p-stock').value     = 0
    document.getElementById('m-p-warn').value      = 10
    document.getElementById('m-p-cat').value       = ''
    document.getElementById('m-p-sup').value       = ''
  }
  openModal('product')
}

async function saveProduct() {
  const editId = document.getElementById('m-p-edit-id').value
  const body = {
    barcode:     document.getElementById('m-p-barcode').value.trim(),
    name:        document.getElementById('m-p-name').value.trim(),
    spec:        document.getElementById('m-p-spec').value.trim(),
    unit:        document.getElementById('m-p-unit').value.trim() || '件',
    cost_price:  parseFloat(document.getElementById('m-p-cost').value)||0,
    sale_price:  parseFloat(document.getElementById('m-p-price').value)||0,
    stock:       parseInt(document.getElementById('m-p-stock').value)||0,
    warn_stock:  parseInt(document.getElementById('m-p-warn').value)||10,
    category_id: document.getElementById('m-p-cat').value || null,
    supplier_id: document.getElementById('m-p-sup').value || null,
  }
  if (!body.barcode || !body.name) return toast('条码和商品名称必填', 'err')
  if (editId) await api('PUT', `/products/${editId}`, body)
  else        await api('POST', '/products', body)
  toast('保存成功'); closeModal('product')
  if (document.querySelector('.nav-item[data-page="inventory"].active')) loadInventory()
}

function genBarcode() {

}

// 入/出库弹窗
// ══════════════════════════════════════════════
async function openStockModal(type, barcode) {
  document.getElementById('m-s-type').value         = type
  document.getElementById('m-stock-title').textContent = type === 'in' ? '📦 入库' : '🚚 出库'
  document.getElementById('m-s-confirm-btn').className = 'btn ' + (type==='in' ? 'btn-green' : 'btn-amber')
  document.getElementById('m-s-confirm-btn').textContent= '确认' + (type==='in' ? '入库' : '出库')
  document.getElementById('m-s-cp-label').textContent  = type === 'in' ? '供应商' : '客户名称'
  ;['m-s-barcode','m-s-qty','m-s-price','m-s-counterpart','m-s-remark'].forEach(id => {
    const el = document.getElementById(id)
    if (id === 'm-s-qty') el.value = 1
    else el.value = ''
  })
  document.getElementById('m-s-product-info').style.display = 'none'
  openModal('stock')
  if (barcode) {
    document.getElementById('m-s-barcode').value = barcode
    await lookupProduct()
  } else {
    setTimeout(() => document.getElementById('m-s-barcode').focus(), 100)
  }
  document.getElementById('m-s-barcode').onkeydown = e => { if (e.key === 'Enter') lookupProduct() }
}

async function lookupProduct() {
  const code = document.getElementById('m-s-barcode').value.trim()
  if (!code) return
  try {
    const { data: p } = await api('GET', `/products/barcode/${code}`)
    document.getElementById('m-s-pname').textContent  = p.name
    document.getElementById('m-s-pspec').textContent  = `${p.spec||'—'} · ${p.category_name||'—'}`
    document.getElementById('m-s-pstock').textContent = `${p.stock} ${p.unit}`
    document.getElementById('m-s-pstock').style.color = p.stock <= p.warn_stock ? 'var(--red)' : 'var(--green)'
    document.getElementById('m-s-product-info').style.display = 'block'
    const type = document.getElementById('m-s-type').value
    document.getElementById('m-s-price').placeholder = type === 'in' ? String(p.cost_price) : String(p.sale_price)
    document.getElementById('m-s-qty').focus()
  } catch { document.getElementById('m-s-product-info').style.display = 'none' }
}

async function confirmStock() {
  const type = document.getElementById('m-s-type').value
  const bc   = document.getElementById('m-s-barcode').value.trim()
  const qty  = parseInt(document.getElementById('m-s-qty').value) || 0
  const cp   = document.getElementById('m-s-counterpart').value
  const rem  = document.getElementById('m-s-remark').value
  const pr   = parseFloat(document.getElementById('m-s-price').value) || undefined
  if (!bc)      return toast('请输入条码', 'err')
  if (qty < 1)  return toast('数量必须大于0', 'err')
  const body = { barcode: bc, qty, unit_price: pr, remark: rem, [type==='in'?'supplier':'customer']: cp||undefined }
  await api('POST', `/stock/${type}`, body)
  toast(type==='in' ? '入库成功 ✅' : '出库成功 📤')
  closeModal('stock')
  // 刷新当前页
  const curPage = document.querySelector('.nav-item.active')?.dataset?.page
  if (curPage === 'inventory') loadInventory()
  else if (curPage === 'records') loadRecords()
  else if (curPage === 'scan') loadScanToday()
  else if (curPage === 'dashboard') dashboard()
}

// ══════════════════════════════════════════════
// 分页组件
// ══════════════════════════════════════════════
function renderPager(containerId, cur, total, cb) {
  const el = document.getElementById(containerId)
  if (!el) return
  if (total <= 1) { el.innerHTML = ''; return }
  let html = `<span style="color:var(--text3)">第 ${cur}/${total} 页</span>`
  if (cur > 1)    html += `<button class="page-btn" onclick="(${cb.toString()})(${cur-1})">‹ 上一页</button>`
  // 最多显示5个页码
  const start = Math.max(1, cur - 2), end = Math.min(total, cur + 2)
  for (let i = start; i <= end; i++) {
    html += `<button class="page-btn ${i===cur?'active':''}" onclick="(${cb.toString()})(${i})">${i}</button>`
  }
  if (cur < total) html += `<button class="page-btn" onclick="(${cb.toString()})(${cur+1})">下一页 ›</button>`
  el.innerHTML = html
}

// ══════════════════════════════════════════════
// CSV 导出
// ══════════════════════════════════════════════
function downloadCSV(rows, filename) {
  const csv = rows.map(r => r.map(c => `"${String(c).replace(/"/g,'""')}"`).join(',')).join('\n')
  const a   = document.createElement('a')
  a.href    = 'data:text/csv;charset=utf-8,\uFEFF' + encodeURIComponent(csv)
  a.download = filename + '.csv'
  a.click()
}
